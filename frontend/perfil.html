<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Meu Perfil | Lunea</title>

  <link rel="stylesheet" href="css/perfil.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <main class="profile-page">

    <section class="profile-card">

      <a href="/" class="profile-logo">Lunea</a>

      <div class="profile-layout">

        <aside class="profile-sidebar">

          <div class="profile-header">
            <div class="profile-avatar">
              <i data-lucide="user"></i>
            </div>

            <div>
              <span>Minha conta</span>
              <h1 id="nomeUsuario">Carregando...</h1>
              <p id="emailUsuario">Carregando...</p>
            </div>
          </div>

          <div class="profile-actions">
            <a href="/" class="btn-secondary">
              Voltar para loja
            </a>

            <button id="btnLogout" class="btn-danger">
              Sair da conta
            </button>
          </div>

        </aside>

        <div class="profile-content">

          <form id="perfilForm" class="profile-form">

            <div class="form-group">
              <label>Nome</label>
              <input type="text" id="nome" required>
            </div>

            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="email" disabled>
            </div>

            <div class="form-group full">
              <label>Telefone</label>
              <input type="text" id="telefone">
            </div>

            <div class="form-divider">
              Endereço de entrega
            </div>

            <div class="form-group">
              <label>CEP</label>
              <input type="text" id="cep" placeholder="Ex: 15500-000">
            </div>

            <div class="form-group">
              <label>Rua</label>
              <input type="text" id="rua" placeholder="Nome da rua">
            </div>

            <div class="form-group">
              <label>Número</label>
              <input type="text" id="numero" placeholder="123">
            </div>

            <div class="form-group">
              <label>Bairro</label>
              <input type="text" id="bairro" placeholder="Centro">
            </div>

            <div class="form-group">
              <label>Cidade</label>
              <input type="text" id="cidade" placeholder="Votuporanga">
            </div>

            <div class="form-group">
              <label>Estado</label>
              <input type="text" id="estado" placeholder="SP">
            </div>

            <button type="submit" class="btn-primary">
              Salvar alterações
            </button>

          </form>

        </div>

      </div>

    </section>

  </main>

  <div class="toast" id="toast"></div>

  <script src="js/perfil.js"></script>

  <script>
    lucide.createIcons();
  </script>

</body>

</html>
