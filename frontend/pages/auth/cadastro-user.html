<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta | Lunea</title>

  <link rel="stylesheet" href="/css/auth-user.css">
</head>
<body>

  <main class="auth-page">

    <section class="auth-card">

      <a href="/" class="auth-logo">Lunea</a>

      <div class="auth-header">
        <span>Bem-vinda à Lunea</span>
        <h1>Criar conta</h1>
        <p>Cadastre-se para acompanhar seus pedidos e salvar seus dados.</p>
      </div>

      <form id="cadastroForm" class="auth-form">

        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="nome" required>
        </div>

        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label>Telefone</label>
          <input type="text" id="telefone">
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" required>
        </div>

        <button type="submit">Criar conta</button>

      </form>

      <p class="auth-link">
        Já tem conta?
        <a href="/entrar">Entrar</a>
      </p>

    </section>

  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/auth-user.js"></script>
</body>
</html>
